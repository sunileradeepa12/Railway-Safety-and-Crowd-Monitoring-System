<!DOCTYPE html>
<html>
<head>

<title>Alerts - Railway Safety</title>
<style>

    body{
font-family: Arial;
background:#f5f6fa;
margin:0;
}

/* TOP BAR */

.topbar{
background: #4771ba;
color:white;
padding:15px;
text-align:center;
font-size:25px;
font-weight:bold;
height: 40px;
}

/* NAVBAR */

.nav{
background:#2c3e50;
padding:10px;
text-align:center;
height: 40px;
}

.nav a{
color:white;
margin:0 50px;
text-decoration:none;
font-size: 17px;
font-weight:bold;
}

.nav a:hover{
text-decoration:underline;
}

/* ALERT BANNER */

.alert-banner{
background:#e74c3c;
color:white;
padding:15px;
text-align:center;
font-size:20px;
margin:20px;
border-radius:8px;
}

/* GRID */

.alert-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin:20px;
}

/* CARDS */

.alert-card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

.big-number{
font-size:40px;
font-weight:bold;
margin-top:10px;
}

/* LOGS */

.logs{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="topbar">
Railway Safety Crowd Monitoring — Alerts Panel
</div>

<!-- NAVBAR -->

<div class="nav">
<a href="/">Home</a>
<a href="/camera">Camera Setup</a>
<a href="/dashboard">Dashboard</a>
<a href="/alerts">Alerts</a>
<a href="/analytics">Analytics</a>
<a href="/settings">Settings</a>
</div>

<!-- ALERT BANNER -->

<div class="alert-banner" id="alertBanner">
✓ Situation Under Control
</div>

<!-- ALERT CARDS -->

<div class="alert-grid">

<div class="alert-card">
<h3>Live People Count</h3>
<div id="people_count" class="big-number">0</div>
</div>

<div class="alert-card">
<h3>Current Status</h3>
<div id="status" class="big-number">NORMAL</div>
</div>

<div class="alert-card">
<h3>Threshold Limit</h3>
<div id="threshold" class="big-number">0</div>
</div>

<div class="alert-card">
<h3>System Action</h3>
<div id="action" class="big-number">Monitoring</div>
</div>

</div>

<!-- ALERT LOGS -->

<div class="logs">
<h3>Recent Alert Activity</h3>
<ul id="alertLog"></ul>
</div>

<audio id="alarmSound" loop>
    <source src="/static/uploads/siren.mp3" type="audio/mpeg">
    </audio>


<script>

document.addEventListener("DOMContentLoaded", function(){

function updateAlerts(){

fetch("/live_data")
.then(res => res.json())
.then(data => {

document.getElementById("people_count").innerText = data.people
document.getElementById("status").innerText = data.status
document.getElementById("threshold").innerText = data.threshold

const banner = document.getElementById("alertBanner")

if(data.status=="HIGH"){

document.getElementById("action").innerText = "Authorities Notified"

banner.innerText = "⚠ CROWD ALERT - Immediate Action Required"
banner.style.background = "#e74c3c"

var alarm=
    document.getElementById("alarmSound");
    alarm.currentTime=0;
    alarm.play();


/* ADD ALERT LOG */

let log = document.getElementById("alertLog")
let time = new Date().toLocaleTimeString()

let li = document.createElement("li")
li.innerText = time + " - HIGH Crowd Level Detected"

log.prepend(li)

}else{

document.getElementById("action").innerText = "Monitoring"

banner.innerText = "✓ Situation Under Control"
banner.style.background = "#27ae60"

}

})

.catch(err => console.log(err))

}

setInterval(updateAlerts,2000)

updateAlerts()

})

</script>

</body>
</html>
